<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact || Gurleen Singh</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <script type="text/javascript"
        src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
    </script>
    <script type="text/javascript">
    (function(){
        emailjs.init({
            publicKey: "I1lnPyEDcDc64bZdQ",
        });
    })();
    </script>

    <div id="navBar"></div>

    <div class="bothContactSection">

        <div class="contactSec" id="contact">
            <h3 class="contactHead">Contact Us</h3>
            
            <h3 class="conHead">Frontend Developer</h3>
            
            <p class="conDetail">I'm currently seeking Frontend Developer Internship opportunities. Feel free to reach out regarding internships, projects, or any questions.</p>
            
            <p class="detailContact">
                <img src="profile-image.jpg" alt="Name" class="conLogo">
                <span class="conAnchor">Gurleen Singh</span>
            </p>
            
            <p class="detailContact" id="paraDetailContact">
                <img src="location-logo.avif" alt="LocationLogo" class="conLogo"> 
                <span class="conAnchor">India</span>
            </p>
        
        </div>

        <form id="myForm">
            <input type="text" id="name" class="inputField" placeholder="Your name" required>

            <input type="email" id="email" class="inputField" placeholder="Your email" required>

            <textarea id="textarea" class="inputField" placeholder="Enter here..." required></textarea>

            <button type="submit" class="submitBtn" id="submitBtn">Submit</button>

            <p id="successMsg"></p>
        </form>
        
    </div>

    <div id="footer"></div> 

    <script src="footer.js"></script>
    <script src="script.js"></script>
    <script src="contact.js"></script>
</body>
</html>
